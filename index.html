<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Group Reflection</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px 0;
        }

        .section-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h2 { color: var(--primary-color); margin-top: 0; }

        .scripture {
            font-style: italic;
            border-left: 4px solid var(--primary-color);
            padding-left: 15px;
            margin: 15px 0;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:active { transform: scale(0.98); }
        
        #statusMessage {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Growth Group</h1>
        <p>Sunday Morning Reflection</p>
    </div>

    <!-- WEEKLY CONTENT SECTION: Update this part every week -->
    <div class="section-card">
        <h2>Today's Scripture</h2>
        <div class="scripture">
            "For where two or three are gathered in my name, there am I among them." <br>
            <strong>— Matthew 18:20</strong>
        </div>
        
        <h3>Reflection Questions</h3>
        <ul>
            <li>What stood out to you in today's sermon?</li>
            <li>How can you apply this to your upcoming week?</li>
        </ul>
    </div>

    <!-- SUBMISSION FORM -->
    <div class="section-card">
        <h2>Submit Your Reflection</h2>
        <form id="reflectionForm">
            <input type="text" name="name" placeholder="Your Name" required>
            <textarea name="reflection" rows="4" placeholder="Share your thoughts..." required></textarea>
            <button type="submit" id="submitBtn">Send to Group</button>
        </form>
        <div id="statusMessage"></div>
    </div>
</div>

<script>
    const form = document.getElementById('reflectionForm');
    const statusMsg = document.getElementById('statusMessage');

    form.addEventListener('submit', e => {
        e.preventDefault();
        statusMsg.innerText = "Connecting to Excel...";

        // This URL would come from your Power Automate "HTTP Trigger"
        const excelEndpointURL = 'https://defaultd196a604d993402890dfe223d68126.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/897d722dba7a48f6a3bfe41fd26a3cee/triggers/manual/paths/invoke?api-version=1';

        // Convert Form Data to a JSON object
        const formData = new FormData(form);
        const data = {
            name: formData.get('name'),
            reflection: formData.get('reflection'),
            date: new Date().toISOString()
        };

        fetch(excelEndpointURL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (response.ok) {
                statusMsg.innerText = "Saved to Excel successfully!";
                form.reset();
            }
        })
        .catch(error => {
            statusMsg.innerText = "Upload failed.";
            console.error('Coding Error:', error);
        });
    });
</script>

</body>
</html>
